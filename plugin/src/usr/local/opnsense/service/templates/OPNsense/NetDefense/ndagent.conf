# DO NOT EDIT
# THIS FILE IS AUTOMATICALLY GENERATED - ANY CHANGES WILL BE OVERWRITTEN
#
# NetDefense Agent Configuration
# Generated from OPNsense NetDefense plugin settings
#
{% if not helpers.empty('OPNsense.netdefense.settings.enabled') %}
# Service enabled
enabled=true

# Registration token
{%   if helpers.exists('OPNsense.netdefense.settings.token') %}
token={{ OPNsense.netdefense.settings.token }}
{%   endif %}

# Device UUID
{%   if helpers.exists('OPNsense.netdefense.settings.deviceId') %}
device_uuid={{ OPNsense.netdefense.settings.deviceId }}
{%   endif %}

# Re-bind token — operator-issued one-time token used to re-bind this
# device's signing keypair (suspected leak, hardware swap, routine
# rotation). Pasted into the OPNsense plugin's "Re-bind Token" field
# after the operator runs `ndcli device rebind-token <name>`. The agent
# rotates its local keypair automatically when this is set, forwards
# the token on the next DeviceRegistrationStart, and zeroes the
# in-memory copy after the response. Operator clears the GUI field
# manually after confirming the device is ENABLED. See
# PAYLOAD-SIGNATURES-FINDINGS-FIXES.md §3 Finding 2.
{%   if helpers.exists('OPNsense.netdefense.settings.bootstrapToken') %}
bootstrap_token={{ OPNsense.netdefense.settings.bootstrapToken }}
{%   endif %}

# Server configuration
{%   if helpers.exists('OPNsense.netdefense.settings.serverAddress') %}
{%     set server_url = OPNsense.netdefense.settings.serverAddress %}
{%     if "://" in server_url %}
{%       set url_parts = server_url.split("://") %}
{%       set scheme = url_parts[0] %}
{%       set host_port = url_parts[1] %}
{%       if ":" in host_port %}
{%         set host_port_parts = host_port.split(":") %}
{%         set host = host_port_parts[0] %}
{%         set port = host_port_parts[1] %}
{%       else %}
{%         set host = host_port %}
{%         if scheme == "https" %}
{%           set port = "443" %}
{%         else %}
{%           set port = "80" %}
{%         endif %}
{%       endif %}
server_host={{ host }}
server_port={{ port }}
{%     else %}
# Fallback if URL format is invalid
server_host={{ server_url }}
server_port=443
{%     endif %}
{%   endif %}

# SSL verification override
{%   if helpers.exists('OPNsense.netdefense.settings.sslVerify') %}
{%     if OPNsense.netdefense.settings.sslVerify|default("1") == "1" %}
ssl_verify=true
{%     else %}
ssl_verify=false
{%     endif %}
{%   endif %}

# Pathfinder configuration
{%   if helpers.exists('OPNsense.netdefense.settings.pathfinderHost') %}
pathfinder_host={{ OPNsense.netdefense.settings.pathfinderHost }}
{%   endif %}
{%   if helpers.exists('OPNsense.netdefense.settings.pathfinderTlsVerify') %}
{%     if OPNsense.netdefense.settings.pathfinderTlsVerify|default("1") == "1" %}
pathfinder_tls_verify=true
{%     else %}
pathfinder_tls_verify=false
{%     endif %}
{%   endif %}
{%   if helpers.exists('OPNsense.netdefense.settings.pathfinderShell') %}
pathfinder_shell={{ OPNsense.netdefense.settings.pathfinderShell }}
{%   endif %}

# Configuration file path (fixed)
config_xml_path=/conf/config.xml

# Logging configuration
{%   if helpers.exists('OPNsense.netdefense.settings.logLevel') %}
log_level={{ OPNsense.netdefense.settings.logLevel }}
{%   endif %}

# OPNsense API credentials for firewall management
{%   if helpers.exists('OPNsense.netdefense.settings.apiKey') and helpers.exists('OPNsense.netdefense.settings.apiSecret') %}
{%     set api_key = OPNsense.netdefense.settings.apiKey %}
{%     set api_secret = OPNsense.netdefense.settings.apiSecret %}
{%     if api_key and api_secret %}
api_key={{ api_key }}
api_secret={{ api_secret }}
opnsense_api_url=https://127.0.0.1/api
{%     endif %}
{%   endif %}

# Service configuration
binary_path=/usr/local/opnsense/scripts/OPNsense/NetDefense/ndagent
pid_file=/var/run/ndagent.pid
log_file=/var/log/ndagent.log

# NDManager trust set (primary + emergency public keys) is auto-discovered
# at first connect via TOFU: agent fetches https://${server_host}:${server_port}/api/v1/.well-known/keys
# over TLS and pins both kids+pubkeys to /var/db/ndagent/ndm-keys.json
# (mode 0600). Subsequent runs read from cache; rotation flows through
# emergency-signed directives (see ROTATION-DIRECTIVE.md at the CoreCode root).
# To force re-bootstrap (e.g. NDM kid rotated and rotation directive flow
# is not yet implemented): rm /var/db/ndagent/ndm-keys.json && service ndagent restart.
{% else %}
# Service disabled
enabled=false
{% endif %}