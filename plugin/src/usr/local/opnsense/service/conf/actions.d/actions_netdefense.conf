[start]
command:/usr/local/etc/rc.d/ndagent start
type: script
message: starting NetDefense Agent

[stop]
command:/usr/local/etc/rc.d/ndagent stop; exit 0
type: script
message: stopping NetDefense Agent

[restart]
command:/usr/local/etc/rc.d/ndagent restart
type: script
message: restarting NetDefense Agent

[status]
command:/usr/local/etc/rc.d/ndagent status; exit 0
type: script_output
message: NetDefense Agent status

[reload]
command:/usr/local/etc/rc.d/ndagent reload
type: script
message: reload NetDefense Agent configuration